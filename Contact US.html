<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Online Examination System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        h1, h2 {
            color: #0056b3;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        h2 {
            font-size: 2rem;
            margin-top: 40px;
        }
        .section {
            margin-bottom: 30px;
        }
        .feedback-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .feedback-form input, .feedback-form textarea {
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ced4da;
            font-size: 1rem;
        }
        .feedback-form button {
            padding: 15px;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .feedback-form button:hover {
            background-color: #0056b3;
        }
        .developer-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .developer-card {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 10px;
            padding: 20px;
            flex: 1 1 calc(30% - 20px);
            text-align: center;
            transition: transform 0.3s;
        }
        .developer-card:hover {
            transform: translateY(-10px);
        }
        .developer-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
        }
        .social-links a {
            margin: 0 10px;
            color: #007bff;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Contact Us</h1>
        
        <div class="section">
            <h2>Send us a Message</h2>
            <form class="feedback-form">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Your Message" rows="5" required></textarea>
                <button type="submit">Submit</button>
            </form>
        </div>

        <div class="section">
            <h2>Our Developers</h2>
            <div class="developer-container">
                <div class="developer-card">
                    <img src="./image/abhishek.jpeg" alt="Abhishek Kumar" class="developer-img">
                    <h3>Abhishek Kumar</h3>
                    <div class="social-links">
                        <a href="#" target="_blank"><i class="fab fa-facebook-f"></i></a>
                        <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
                        <a href="#" target="_blank"><i class="fab fa-telegram-plane"></i></a>
                    </div>
                </div>
                <div class="developer-card">
                    <img src="./image/abhishek-pal.jpeg" alt="Abhishek Pal" class="developer-img">
                    <h3>Abhishek Pal</h3>
                    <div class="social-links">
                        <a href="#" target="_blank"><i class="fab fa-facebook-f"></i></a>
                        <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
                        <a href="#" target="_blank"><i class="fab fa-telegram-plane"></i></a>
                    </div>
                </div>
                <div class="developer-card">
                    <img src="./image/ansh.jpeg" alt="Ansh Raj Sharma" class="developer-img">
                    <h3>Ansh Raj Sharma</h3>
                    <div class="social-links">
                        <a href="#" target="_blank"><i class="fab fa-facebook-f"></i></a>
                        <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
                        <a href="#" target="_blank"><i class="fab fa-telegram-plane"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
